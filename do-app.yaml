# DigitalOcean App Platform spec
# Deploy via: doctl apps create --spec do-app.yaml
name: bmail
services:
  - name: relay
    github:
      repo: 1889ca/bmail
      branch: main
      deploy_on_push: true
    build_command: npm ci --omit=dev
    run_command: node src/index.js
    environment_slug: node-js
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-0.5gb
    http_port: 3100
    envs:
      - key: PORT
        value: "3100"
      - key: BASE_URL
        scope: RUN_TIME
        type: GENERAL
      - key: MASTER_KEY
        scope: RUN_TIME
        type: SECRET
      - key: GITHUB_CLIENT_ID
        scope: RUN_TIME
        type: GENERAL
      - key: GITHUB_CLIENT_SECRET
        scope: RUN_TIME
        type: SECRET
      - key: GOOGLE_CLIENT_ID
        scope: RUN_TIME
        type: GENERAL
      - key: GOOGLE_CLIENT_SECRET
        scope: RUN_TIME
        type: SECRET
